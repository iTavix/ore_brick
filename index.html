  <script>
  /* Rete di sicurezza diagnostica (ES5): cattura errori di parsing/runtime
     dello script principale e li mostra a schermo invece di lasciare la pagina
     vuota. Utile soprattutto su Safari, dove un errore silenzioso azzera la vista. */
  (function () {
    function showFatal(msg) {
      try {
        var host = document.getElementById('view-dashboard') || document.getElementById('app-shell') || document.body;
        if (!host) return;
        var box = document.getElementById('fatal-error-box');
        if (!box) {
          box = document.createElement('div');
          box.id = 'fatal-error-box';
          box.style.cssText = 'margin:16px;padding:16px 18px;border:1px solid #ff3b30;background:#fff3f2;color:#7a1c16;border-radius:14px;font:13px/1.5 -apple-system,system-ui,sans-serif;white-space:pre-wrap;word-break:break-word;';
          host.appendChild(box);
        }
        box.textContent = 'Errore di avvio:\n' + msg;
      } catch (e) {}
    }
    window.__hfShowFatal = showFatal;
    window.addEventListener('error', function (ev) {
      var m = (ev && ev.message) ? ev.message : 'errore sconosciuto';
      if (ev && ev.filename) m += '\n@ ' + ev.filename + ':' + ev.lineno + ':' + ev.colno;
      if (ev && ev.error && ev.error.stack) m += '\n' + String(ev.error.stack).split('\n').slice(0, 3).join('\n');
      showFatal(m);
    });
    window.addEventListener('unhandledrejection', function (ev) {
      var r = ev && ev.reason;
      showFatal('Promise non gestita: ' + ((r && r.message) ? r.message : String(r)));
    });
    window.addEventListener('load', function () {
      setTimeout(function () {
        var dash = document.getElementById('view-dashboard');
        if (dash && dash.children.length === 0 && !document.getElementById('fatal-error-box')) {
          showFatal('Avvio non completato: il contenuto non e\' stato generato e nessun errore e\' stato intercettato. Probabile sintassi non eseguita da Safari nello script principale.');
        }
      }, 1500);
    });
  })();
  </script>
