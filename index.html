<script>
"use strict";

/* =====================================================================
   Ore BrickBoy — Single-file advanced hours & invoice management
   ===================================================================== */

const $ = (sel, root = document) => root.querySelector(sel);
const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));

function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function genId() {
  try { if (crypto && crypto.randomUUID) return crypto.randomUUID(); } catch (_) {}
  try {
    const b = new Uint8Array(16); crypto.getRandomValues(b);
    return Array.from(b, x => x.toString(16).padStart(2, '0')).join('');
  } catch (_) {}
  return 'id-' + Date.now() + '-' + Math.random().toString(16).slice(2);
}

function eur(n) {
  return (Number(n) || 0).toLocaleString('it-IT', { style: 'currency', currency: 'EUR' });
}

function hrs(n) {
  const v = Number(n) || 0;
  return v.toLocaleString('it-IT', { maximumFractionDigits: 2 }) + (v === 1 ? ' h' : ' h');
}

function dateIt(iso) {
  if (!iso || !/^\d{4}-\d{2}-\d{2}$/.test(iso)) return '—';
  const [y, m, d] = iso.split('-');
  return `${d}/${m}/${y}`;
}

function todayIso() {
  const d = new Date();
  const p = (x) => String(x).padStart(2, '0');
  return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())}`;
}

function maskIban(iban) {
  const v = String(iban == null ? '' : iban).replace(/\s+/g, '');
  if (!v) return '';
  let out = v.length <= 8 ? '•'.repeat(v.length) : v.slice(0, 4) + '•'.repeat(v.length - 8) + v.slice(-4);
  return out.replace(/(.{4})/g, '$1 ').trim();
}

function groupIban(iban) {
  const v = String(iban == null ? '' : iban).replace(/\s+/g, '');
  return v ? v.replace(/(.{4})/g, '$1 ').trim() : '';
}

/* ---------------------------------------------------------------------
   Secure Storage Helper & Fallback Engine
--------------------------------------------------------------------- */
function getLocalStorageItem(key) {
  try {
    return (typeof window !== 'undefined' && window.localStorage) ? window.localStorage.getItem(key) : null;
  } catch (e) {
    return null;
  }
}

function setLocalStorageItem(key, value) {
  try {
    if (typeof window !== 'undefined' && window.localStorage) {
      window.localStorage.setItem(key, value);
    }
  } catch (e) {
    console.warn("Impossibile salvare nel localStorage: ", e);
  }
}

const DB_NAME = 'ore-brickboy';
const DB_VERSION = 1;
let _db = null;
let _useFallback = false;

// Memory storage in case localStorage blocks as well
const fallbackData = {
  settings: {},
  projects: [],
  entries: [],
  timer: {}
};

function initFallbackStorage() {
  _useFallback = true;
  const fallbackBadge = $('#fallback-badge');
  if (fallbackBadge) fallbackBadge.classList.remove('hidden');
  try {
    const parsedSettings = JSON.parse(getLocalStorageItem('obb_settings'));
    fallbackData.settings = (parsedSettings && typeof parsedSettings === 'object' && !Array.isArray(parsedSettings)) ? parsedSettings : {};

    const parsedProjects = JSON.parse(getLocalStorageItem('obb_projects'));
    fallbackData.projects = Array.isArray(parsedProjects) ? parsedProjects : [];

    const parsedEntries = JSON.parse(getLocalStorageItem('obb_entries'));
    fallbackData.entries = Array.isArray(parsedEntries) ? parsedEntries : [];

    const parsedTimer = JSON.parse(getLocalStorageItem('obb_timer'));
    fallbackData.timer = (parsedTimer && typeof parsedTimer === 'object' && !Array.isArray(parsedTimer)) ? parsedTimer : {};
  } catch (e) {
    console.warn("Storage di fallback basato solo sulla memoria volatile.", e);
    // Safe fallback to default instances in memory
    fallbackData.settings = {};
    fallbackData.projects = [];
    fallbackData.entries = [];
    fallbackData.timer = {};
  }
}

function saveFallback(store) {
  if (!_useFallback) return;
  setLocalStorageItem('obb_' + store, JSON.stringify(fallbackData[store]));
}

function openDB() {
  return new Promise((resolve, reject) => {
    try {
      if (typeof indexedDB === 'undefined' || indexedDB === null) {
        throw new Error("IndexedDB non supportato o bloccato in questo contesto.");
      }
      const req = indexedDB.open(DB_NAME, DB_VERSION);
      req.onupgradeneeded = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains('settings')) db.createObjectStore('settings', { keyPath: 'id' });
        if (!db.objectStoreNames.contains('projects')) db.createObjectStore('projects', { keyPath: 'id' });
        if (!db.objectStoreNames.contains('entries')) {
          const s = db.createObjectStore('entries', { keyPath: 'id' });
          s.createIndex('projectId', 'projectId', { unique: false });
        }
        if (!db.objectStoreNames.contains('timer')) db.createObjectStore('timer', { keyPath: 'id' });
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error || new Error("Errore durante l'apertura del database."));
    } catch (err) {
      reject(err);
    }
  });
}

function tx(store, mode) {
  return _db.transaction(store, mode).objectStore(store);
}
function idbReq(request) {
  return new Promise((resolve, reject) => {
    request.onsuccess = () => resolve(request.result);
    request.onerror = () => reject(request.error);
  });
}

const dbGet = async (store, key) => {
  if (_useFallback) {
    if (store === 'settings' || store === 'timer') {
      return fallbackData[store][key] || null;
    }
    return null;
  }
  try {
    return await idbReq(tx(store, 'readonly').get(key));
  } catch (err) {
    console.warn("DB Get fallito. Attivazione immediata del fallback...", err);
    initFallbackStorage();
    return dbGet(store, key); // Ripete con la modalità fallback
  }
};

const dbGetAll = async (store) => {
  if (_useFallback) {
    if (store === 'projects') return fallbackData.projects;
    if (store === 'entries') return fallbackData.entries;
    if (store === 'settings') return Object.values(fallbackData.settings);
    return [];
  }
  try {
    return await idbReq(tx(store, 'readonly').getAll());
  } catch (err) {
    console.warn("DB GetAll fallito. Attivazione immediata del fallback...", err);
    initFallbackStorage();
    return dbGetAll(store); // Ripete con la modalità fallback
  }
};

const dbPut = async (store, value) => {
  if (_useFallback) {
    if (store === 'settings' || store === 'timer') {
      fallbackData[store][value.id] = value;
    } else if (store === 'projects' || store === 'entries') {
      const idx = fallbackData[store].findIndex(item => item.id === value.id);
      if (idx > -1) {
        fallbackData[store][idx] = value;
      } else {
        fallbackData[store].push(value);
      }
    }
    saveFallback(store);
    return value;
  }
  try {
    return await idbReq(tx(store, 'readwrite').put(value));
  } catch (err) {
    console.warn("DB Put fallito. Attivazione immediata del fallback...", err);
    initFallbackStorage();
    return dbPut(store, value); // Ripete con la modalità fallback
  }
};

const dbDel = async (store, key) => {
  if (_useFallback) {
    if (store === 'settings' || store === 'timer') {
      delete fallbackData[store][key];
    } else if (store === 'projects' || store === 'entries') {
      fallbackData[store] = fallbackData[store].filter(item => item.id !== key);
    }
    saveFallback(store);
    return;
  }
  try {
    return await idbReq(tx(store, 'readwrite').delete(key));
  } catch (err) {
    console.warn("DB Del fallito. Attivazione immediata del fallback...", err);
    initFallbackStorage();
    return dbDel(store, key); // Ripete con la modalità fallback
  }
};

function dbClear(store) {
  if (_useFallback) {
    if (store === 'projects' || store === 'entries') {
      fallbackData[store] = [];
    }
    saveFallback(store);
    return Promise.resolve();
  }
  try {
    const t = _db.transaction(store, 'readwrite');
    return new Promise((resolve, reject) => {
      const req = t.objectStore(store).clear();
      req.onsuccess = () => resolve();
      req.onerror = () => reject(req.error);
    });
  } catch (err) {
    console.warn("DB Clear fallito. Attivazione immediata del fallback...", err);
    initFallbackStorage();
    return dbClear(store); // Ripete con la modalità fallback
  }
}

/* ---------------------------------------------------------------------
   Seed Data
--------------------------------------------------------------------- */
const DEFAULT_SETTINGS = {
  id: 'app',
  hourlyRate: 25,
  extra: 0,
  taxRate: 0,
  holderName: 'Claudio Tavella',
  iban: 'IT47R0364601600526311864007',
  bic: 'NTSBITM1XXX',
  theme: 'auto'
};

async function seedIfEmpty() {
  const existing = await dbGetAll('projects');
  const hasSettings = await dbGet('settings', 'app');
  if (!hasSettings) await dbPut('settings', { ...DEFAULT_SETTINGS });
  if (existing && existing.length) return;

  const p1 = { id: genId(), name: 'Arcade BrickBoy', createdAt: '2026-06-17', hourlyRate: 30, clientName: 'Retrogames SRL', clientAddress: 'Via Roma 12, Milano' };
  const p2 = { id: genId(), name: 'GameBoy BrickBoy', createdAt: '2026-05-22', hourlyRate: null, clientName: 'Console Club', clientAddress: 'Corso Sempione 8, Roma' };
  const p3 = { id: genId(), name: 'Play station 1 BrickBoy', createdAt: '2026-03-30', hourlyRate: 35, clientName: 'Sony Fans', clientAddress: 'Piazza Duomo 3, Torino' };
  for (const p of [p1, p2, p3]) await dbPut('projects', p);

  const seedEntries = [
    { id: genId(), projectId: p1.id, spec: 'Seconda Iterazione Arcade', date: '2026-06-17', hours: 1 },
    { id: genId(), projectId: p2.id, spec: 'Seconda Iterazione istruzioni', date: '2026-05-22', hours: 5 },
    { id: genId(), projectId: p2.id, spec: 'Terza Iterazione istruzioni', date: '2026-06-11', hours: 2 },
    { id: genId(), projectId: p3.id, spec: 'Realizzazione file studio Play Station 1', date: '2026-03-30', hours: 0 }
  ];
  for (const e of seedEntries) await dbPut('entries', e);

/* ---------------------------------------------------------------------
   In-memory State
--------------------------------------------------------------------- */
const state = {
  settings: { ...DEFAULT_SETTINGS },
  projects: [],
  entries: [],
  view: 'dashboard',
  expanded: new Set(),
  activeTimer: null
};

async function loadState() {
  const s = await dbGet('settings', 'app');
  state.settings = s ? s : { ...DEFAULT_SETTINGS };
  state.projects = (await dbGetAll('projects')) || [];
  state.entries = (await dbGetAll('entries')) || [];
  state.activeTimer = await dbGet('timer', 'current') || null;

  // Protegge l'applicazione da formati corrotti o inconsistenti
  if (!Array.isArray(state.projects)) state.projects = [];
  if (!Array.isArray(state.entries)) state.entries = [];

  state.projects.sort((a, b) => String(a.createdAt || '').localeCompare(String(b.createdAt || '')) || String(a.name || '').localeCompare(String(b.name || '')));
  state.entries.sort((a, b) => String(a.date || '').localeCompare(String(b.date || '')));
}

/* ---------------------------------------------------------------------
   Derived Calculations
--------------------------------------------------------------------- */
function entriesOf(projectId) {
  return state.entries.filter(e => e.projectId === projectId);
}
function projectHours(projectId) {
  return entriesOf(projectId).reduce((sum, e) => sum + (Number(e.hours) || 0), 0);
}
function projectCompensation(project) {
  const rate = project.hourlyRate != null && project.hourlyRate !== '' ? Number(project.hourlyRate) : Number(state.settings.hourlyRate);
  return projectHours(project.id) * rate;
}
function totalHours() {
  return state.entries.reduce((sum, e) => sum + (Number(e.hours) || 0), 0);
}
function totalCompensation() {
  const extra = Number(state.settings.extra) || 0;
  let baseSum = 0;
  for (const p of state.projects) {
    baseSum += projectCompensation(p);
  }
  return baseSum + extra;
}

/* ---------------------------------------------------------------------
   System Toasts & Theme control
--------------------------------------------------------------------- */
function toast(message, kind = 'ok') {
  const root = $('#toast-root');
  if (!root) return;
  const el = document.createElement('div');
  const themeClasses = 'bg-[#1d1d1f] dark:bg-zinc-800 text-white dark:text-zinc-100';
  el.className = `toast pointer-events-auto ${themeClasses} text-[13px] font-medium px-4 py-2.5 rounded-full shadow-lg flex items-center gap-2 border border-white/5`;
  const dot = kind === 'error' ? '⚠️' : (kind === 'warning' ? '⚙️' : '✓');
  el.innerHTML = `<span>${dot}</span><span>${esc(message)}</span>`;
  root.appendChild(el);
  setTimeout(() => {
    el.style.transition = 'opacity .25s ease, transform .25s ease';
    el.style.opacity = '0'; el.style.transform = 'translateY(8px)';
    setTimeout(() => el.remove(), 280);
  }, 2600);
}

function syncTheme(themeName) {
  const isDark = themeName === 'dark' || (themeName === 'auto' && typeof window !== 'undefined' && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
  document.body.classList.toggle('dark', isDark);
}

/* ---------------------------------------------------------------------
   Modal Manager
--------------------------------------------------------------------- */
function closeModal() {
  const root = $('#modal-root');
  if (root) root.innerHTML = '';
  document.body.style.overflow = '';
}

function openModal(opts) {
  const root = $('#modal-root');
  if (!root) return;
  document.body.style.overflow = 'hidden';
  const danger = opts.danger;
  root.innerHTML = `
    <div class="fixed inset-0 z-40 modal-backdrop flex items-end sm:items-center justify-center p-0 sm:p-4" id="m-backdrop">
      <div class="modal-card bg-white dark:bg-darkCard w-full sm:max-w-md rounded-t-xl2 sm:rounded-xl2 shadow-2xl overflow-hidden border border-black/5 dark:border-darkBorder">
        <div class="px-5 pt-5 pb-1">
          <h2 class="text-[17px] font-semibold tracking-tight dark:text-white">${esc(opts.title || '')}</h2>
        </div>
        <div class="px-5 py-3 dark:text-zinc-200" id="m-body">${opts.bodyHTML || ''}</div>
        <div class="px-5 py-4 flex gap-2 justify-end border-t border-black/5 dark:border-darkBorder bg-gray-50 dark:bg-zinc-900/50">
          <button id="m-cancel" class="px-4 py-2 rounded-full text-[14px] font-medium text-ink-soft dark:text-ink-faint hover:bg-black/5 dark:hover:bg-white/5 transition-soft">${esc(opts.cancelText || 'Annulla')}</button>
          <button id="m-confirm" class="px-4 py-2 rounded-full text-[14px] font-semibold text-white transition-soft ${danger ? 'bg-[#ff3b30] hover:bg-[#e0352b]' : 'bg-accent hover:bg-accent-hover'}">${esc(opts.confirmText || 'Salva')}</button>
        </div>
      </div>
    </div>`;
  const backdrop = $('#m-backdrop');
  if (backdrop) {
    backdrop.addEventListener('mousedown', (e) => { if (e.target === backdrop) closeModal(); });
  }
  const cancelBtn = $('#m-cancel');
  if (cancelBtn) cancelBtn.addEventListener('click', closeModal);

  const card = $('.modal-card', root);
  if (card && typeof opts.onMount === 'function') opts.onMount(card);
  
  const confirm = async () => {
    const ok = opts.onConfirm ? await opts.onConfirm(card) : true;
    if (ok !== false) closeModal();
  };
  
  const confirmBtn = $('#m-confirm');
  if (confirmBtn) confirmBtn.addEventListener('click', confirm);
  
  if (card) {
    card.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && e.target.tagName === 'INPUT' && e.target.type !== 'number' && e.target.tagName !== 'TEXTAREA') { e.preventDefault(); confirm(); }
      if (e.key === 'Escape') closeModal();
    });
    const first = $('input, textarea, select', card);
    if (first) setTimeout(() => first.focus(), 100);
  }
}

function showError(card, msg) {
  let box = $('#m-error', card);
  if (!box) {
    box = document.createElement('div');
    box.id = 'm-error';
    box.className = 'mt-3 text-[13px] text-[#ff3b30] bg-[#ff3b30]/8 rounded-lg px-3 py-2';
    const mBody = $('#m-body', card);
    if (mBody) mBody.appendChild(box);
  }
  box.textContent = msg;
}

/* ---------------------------------------------------------------------
   View Router
--------------------------------------------------------------------- */
function setView(view) {
  state.view = view;
  ['dashboard', 'payment', 'settings', 'guide'].forEach(v => {
    const target = $('#view-' + v);
    if (target) target.classList.toggle('hidden', v !== view);
  });
  $$('#nav button').forEach(b => b.setAttribute('aria-selected', String(b.dataset.view === view)));
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function render() {
  if (state.view === 'dashboard') renderDashboard();
  else if (state.view === 'payment') renderPayment();
  else if (state.view === 'settings') renderSettings();
  else if (state.view === 'guide') renderGuide();
}

/* ---------------------------------------------------------------------

--------------------------------------------------------------------- */
function renderDashboard() {
  const root = $('#view-dashboard');
  if (!root) return;
  const tH = totalHours();

  // Custom SVG visual breakdown chart builder

  const summary = `

    <div class="grid grid-cols-3 gap-3 mb-6">
      ${summaryCard('Ore totali', hrs(tH), 'text-ink dark:text-white')}

      ${summaryCard('Compenso stimato', eur(total), 'text-accent', extra ? `incl. extra ${eur(extra)}` : '')}
    </div>

    <!-- Active Timer Widget -->
    ${buildStopwatchWidgetHTML()}

    <!-- Visual Distribution Chart card -->
    ${chartHtml}`;

  let projectsHTML;
  if (!state.projects.length) {
    projectsHTML = `
      <div class="bg-white dark:bg-darkCard rounded-xl2 border border-black/5 dark:border-darkBorder px-6 py-12 text-center">

      </div>`;
  } else {
    projectsHTML = `<div class="space-y-3">${state.projects.map(projectCard).join('')}</div>`;
  }

  const editable = canEdit();
  const readOnlyBanner = isClient() ? `
    <div class="mb-5 flex items-center gap-2.5 rounded-xl2 border border-blue-500/20 bg-blue-500/10 px-4 py-3 text-[13px] text-blue-700 dark:text-blue-300">
      <span>👁️</span><span>Stai visualizzando come <strong>Cliente</strong> (sola lettura). I dati non sono modificabili.</span>
    </div>` : '';

  root.innerHTML = `
    ${readOnlyBanner}
    ${summary}
    <div class="flex items-center justify-between mb-3 mt-6">
      <h2 class="text-[13px] font-semibold uppercase tracking-wide text-ink-faint dark:text-zinc-500">Progetti</h2>
      ${editable ? `<button id="add-project" class="text-[14px] font-semibold text-accent hover:text-accent-hover transition-soft flex items-center gap-1">
        <span class="text-[18px] leading-none">+</span> Nuovo progetto
      </button>` : ''}
    </div>
    ${projectsHTML}`;

  const addProjBtn = $('#add-project');
  if (addProjBtn) addProjBtn.addEventListener('click', addProject);
  
  $$('[data-toggle]', root).forEach(el => el.addEventListener('click', () => {
    const id = el.dataset.toggle;
    if (state.expanded.has(id)) state.expanded.delete(id); else state.expanded.add(id);
    renderDashboard();
  }));
  $$('[data-add-entry]', root).forEach(el => el.addEventListener('click', (e) => { e.stopPropagation(); addEntry(el.dataset.addEntry); }));
  $$('[data-rename]', root).forEach(el => el.addEventListener('click', (e) => { e.stopPropagation(); renameProject(el.dataset.rename); }));
  $$('[data-del-project]', root).forEach(el => el.addEventListener('click', (e) => { e.stopPropagation(); deleteProject(el.dataset.delProject); }));
  $$('[data-edit-entry]', root).forEach(el => el.addEventListener('click', (e) => { e.stopPropagation(); editEntry(el.dataset.editEntry); }));
  $$('[data-del-entry]', root).forEach(el => el.addEventListener('click', (e) => { e.stopPropagation(); deleteEntry(el.dataset.delEntry); }));

}

/* Simple visual chart rendering */
function buildVisualAnalyticsChart() {
  if (state.projects.length === 0 || totalHours() === 0) return '';
  
  // Calculate heights dynamically for a premium miniature vertical bar chart
  const maxCompensation = Math.max(...state.projects.map(p => projectCompensation(p)), 1);
  
  const bars = state.projects.map((p, index) => {
    const comp = projectCompensation(p);
    const hr = projectHours(p);
    const percentage = (comp / maxCompensation) * 100;
    const colors = ['bg-accent', 'bg-blue-500', 'bg-emerald-500', 'bg-purple-500', 'bg-indigo-500'];
    const activeColor = colors[index % colors.length];
    
    return `
      <div class="flex flex-col items-center flex-1 min-w-[50px]">
        <div class="relative w-7 bg-gray-100 dark:bg-zinc-800 rounded-lg h-28 flex items-end overflow-hidden group">
          <div class="${activeColor} w-full transition-all duration-500 rounded-b-lg" style="height: ${percentage}%">
            <!-- Tooltip -->
            <div class="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 bg-zinc-900 text-white text-[10px] py-1 px-2 rounded opacity-0 group-hover:opacity-100 pointer-events-none transition-soft whitespace-nowrap z-10 shadow-md">
              ${esc(p.name)}: ${hrs(hr)} (${eur(comp)})
            </div>
          </div>
        </div>
        <div class="text-[10px] text-ink-soft dark:text-zinc-400 mt-2 truncate w-full text-center" title="${esc(p.name)}">${esc(p.name)}</div>
        <div class="text-[9px] text-ink-faint font-semibold tabular-nums">${eur(comp)}</div>
      </div>
    `;
  }).join('');

  return `
    <div class="bg-white dark:bg-darkCard p-5 rounded-xl2 border border-black/5 dark:border-darkBorder shadow-[0_1px_2px_rgba(0,0,0,.03)] mb-6">
      <h3 class="text-[12px] font-semibold uppercase tracking-wide text-ink-faint dark:text-zinc-500 mb-4">Ripartizione compensi</h3>
      <div class="flex items-end justify-between gap-2 overflow-x-auto py-2">
        ${bars}
      </div>
    </div>`;
}

async function startProjectTimer(projectId) {
  if (!canEdit()) { toast('Account in sola lettura', 'error'); return; }
  if (state.activeTimer) {
    toast('C\'è già un timer attivo sul progetto. Salva o scarta quello esistente.', 'error');
    return;
  }
  const p = state.projects.find(x => x.id === projectId);
  if (!p) return;

  openModal({
    title: 'Avvia monitoraggio ore',
    bodyHTML: `
      <p class="text-[13px] text-ink-soft dark:text-zinc-400 mb-3">Registrerai la sessione di lavoro in tempo reale su <span class="font-semibold text-ink dark:text-white">${esc(p.name)}</span>.</p>
      <label class="block text-[13px] font-medium text-ink-soft mb-1.5">Descrizione attività (opzionale)</label>
      <input id="f-timer-spec" class="field" placeholder="Es. Sviluppo responsive UI" />
    `,
    confirmText: 'Avvia Timer',
    onConfirm: async (card) => {
      const spec = $('#f-timer-spec', card).value.trim();
      const timerObj = {
        id: 'current',
        projectId,
        spec: spec || 'Sessione di lavoro live',
        startTime: Date.now(),
        paused: false,
        elapsedBeforePause: 0
      };
      state.activeTimer = timerObj;
      await dbPut('timer', timerObj);
      renderDashboard();
      toast('Timer avviato');
    }
  });
}

async function toggleTimerPause() {
  if (!state.activeTimer) return;
  if (state.activeTimer.paused) {
    state.activeTimer.paused = false;
    state.activeTimer.startTime = Date.now();
  } else {
    state.activeTimer.paused = true;
    state.activeTimer.elapsedBeforePause += Date.now() - state.activeTimer.startTime;
  }
  await dbPut('timer', state.activeTimer);
  renderDashboard();
}

async function stopAndSaveTimer() {
  if (!state.activeTimer) return;
  
  // Calculate final elapsed hours
  let totalElapsedMs = state.activeTimer.elapsedBeforePause;
  if (!state.activeTimer.paused) {
    totalElapsedMs += Date.now() - state.activeTimer.startTime;
  }
  
  // Convert MS to hours (rounded to 2 decimals, minimum 0.1h to respect actual work effort)
  const calculatedHours = Math.max(0.1, Math.round((totalElapsedMs / 3600000) * 100) / 100);
  const projectId = state.activeTimer.projectId;
  const spec = state.activeTimer.spec;

  openModal({
    title: 'Registra sessione terminata',
    bodyHTML: `
      <p class="text-[14px] mb-3">Hai lavorato per <span class="font-bold text-accent">${calculatedHours} ore</span>. Vuoi salvare questa voce nel progetto?</p>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-[13px] font-medium text-ink-soft mb-1.5">Data</label>
          <input id="f-final-date" type="date" class="field" value="${todayIso()}" />
        </div>
        <div>
          <label class="block text-[13px] font-medium text-ink-soft mb-1.5">Ore calcolate</label>
          <input id="f-final-hours" type="number" min="0" step="0.05" class="field" value="${calculatedHours}" />
        </div>
      </div>
    `,
    confirmText: 'Registra Voce',
    onConfirm: async (card) => {
      const date = $('#f-final-date', card).value;
      const hours = Number($('#f-final-hours', card).value);
      if (hours <= 0 || isNaN(hours)) { showError(card, 'Le ore devono essere maggiori di 0.'); return false; }
      
      const newEntry = {
        id: genId(),
        projectId,
        spec,
        date: date || todayIso(),
        hours
      };
      
      await dbPut('entries', newEntry);
      await dbDel('timer', 'current');
      
      state.entries.push(newEntry);
      state.entries.sort((a, b) => String(a.date).localeCompare(String(b.date)));
      state.activeTimer = null;
      
      renderDashboard();
      cloudPush();
      toast('Voce registrata con successo');
    }
  });
}

async function discardTimer() {
  openModal({
    title: 'Annullare il timer?',
    danger: true,
    bodyHTML: '<p class="text-[14px] text-ink-soft dark:text-zinc-400">Stai per eliminare la sessione in corso. Le ore monitorate andranno perse.</p>',
    confirmText: 'Sì, scarta',
    onConfirm: async () => {
      await dbDel('timer', 'current');
      state.activeTimer = null;
      renderDashboard();
      toast('Timer scartato');
    }
  });
}

// Global active loop for stopwatch updating
setInterval(() => {
  if (!state.activeTimer) {
    const navWidget = $('#nav-timer-widget');
    if (navWidget) navWidget.classList.add('hidden');
    document.title = "Ore BrickBoy";
    return;
  }
  
  let elapsedMs = state.activeTimer.elapsedBeforePause;
  if (!state.activeTimer.paused) {
    elapsedMs += Date.now() - state.activeTimer.startTime;
  }
  
  const totalSecs = Math.floor(elapsedMs / 1000);
  const hrsNum = Math.floor(totalSecs / 3600);
  const minsNum = Math.floor((totalSecs % 3600) / 60);
  const secsNum = totalSecs % 60;
  
  const pad = (x) => String(x).padStart(2, '0');
  const clockString = `${pad(hrsNum)}:${pad(minsNum)}:${pad(secsNum)}`;
  
  // Update browser header
  document.title = `⏱ [${clockString}] Ore BrickBoy`;
  
  // Update DOM components
  const navWidget = $('#nav-timer-widget');
  const navClock = $('#nav-timer-clock');
  if (navWidget && navClock) {
    navWidget.classList.remove('hidden');
    navClock.textContent = clockString;
  }
  
  const widgetClock = $('#widget-timer-clock');
  if (widgetClock) {
    widgetClock.textContent = clockString;
  }
}, 1000);

function deleteProject(id) {
  if (!canEdit()) { toast('Account in sola lettura', 'error'); return; }
  const p = state.projects.find(x => x.id === id);
  if (!p) return;
  const count = entriesOf(id).length;
  openModal({
    title: 'Eliminare il progetto?',
    danger: true,
    bodyHTML: `<p class="text-[14px] text-ink-soft">Stai per eliminare <span class="font-semibold text-ink">${esc(p.name)}</span>${count ? ` e le sue <span class="font-semibold text-ink">${count}</span> voci` : ''}. L'azione non è reversibile.</p>`,
    confirmText: 'Elimina',
    onConfirm: async () => {
      for (const e of entriesOf(id)) await dbDel('entries', e.id);
      await dbDel('projects', id);
      state.entries = state.entries.filter(e => e.projectId !== id);
      state.projects = state.projects.filter(x => x.id !== id);
      state.expanded.delete(id);
      renderDashboard();
      cloudPush();
      toast('Progetto eliminato');
    }
  });

function entryFormHTML(e) {
  return `
    <label class="block text-[13px] font-medium text-ink-soft mb-1.5">Descrizione (Spec.)</label>

    <div class="grid grid-cols-2 gap-3">

        <input id="f-date" type="date" class="field" value="${e ? esc(e.date) : todayIso()}" />
      </div>
      <div>
        <label class="block text-[13px] font-medium text-ink-soft mb-1.5">Ore</label>
        <input id="f-hours" type="number" min="0" step="0.25" inputmode="decimal" class="field" placeholder="0" value="${e ? esc(e.hours) : ''}" />
      </div>
    </div>`;
}

function validateEntry(card) {
  const spec = $('#f-spec', card).value.trim();
  const date = $('#f-date', card).value;
  const hoursRaw = $('#f-hours', card).value;
  if (!spec) { showError(card, 'La descrizione non può essere vuota.'); return null; }
  if (!/^\d{4}-\d{2}-\d{2}$/.test(date) || isNaN(new Date(date).getTime())) { showError(card, 'Inserisci una data valida.'); return null; }
  const hours = Number(hoursRaw);
  if (hoursRaw === '' || isNaN(hours) || hours < 0) { showError(card, 'Le ore devono essere un numero ≥ 0.'); return null; }
  return { spec, date, hours };
}

function addEntry(projectId) {
  if (!canEdit()) { toast('Account in sola lettura', 'error'); return; }
  openModal({
    title: 'Aggiungi voce',
    bodyHTML: entryFormHTML(null),
    confirmText: 'Aggiungi',
    onConfirm: async (card) => {
      const v = validateEntry(card);
      if (!v) return false;
      const e = { id: genId(), projectId, ...v };
      await dbPut('entries', e);
      state.entries.push(e);
      state.entries.sort((a, b) => String(a.date).localeCompare(String(b.date)));
      state.expanded.add(projectId);
      renderDashboard();
      cloudPush();
      toast('Voce aggiunta');
    }
  });
}

function editEntry(id) {
  if (!canEdit()) { toast('Account in sola lettura', 'error'); return; }
  const e = state.entries.find(x => x.id === id);
  if (!e) return;
  openModal({
    title: 'Modifica voce',
    bodyHTML: entryFormHTML(e),
    confirmText: 'Salva',
    onConfirm: async (card) => {
      const v = validateEntry(card);
      if (!v) return false;
      Object.assign(e, v);
      await dbPut('entries', e);
      state.entries.sort((a, b) => String(a.date).localeCompare(String(b.date)));
      renderDashboard();
      cloudPush();
      toast('Voce aggiornata');
    }
  });
}

function deleteEntry(id) {
  if (!canEdit()) { toast('Account in sola lettura', 'error'); return; }
  const e = state.entries.find(x => x.id === id);
  if (!e) return;
  openModal({
    title: 'Eliminare la voce?',
    danger: true,
    bodyHTML: `<p class="text-[14px] text-ink-soft">Stai per eliminare <span class="font-semibold text-ink">${esc(e.spec)}</span> (${esc(hrs(e.hours))}).</p>`,

function allEntriesFlat() {
  const projectMap = new Map(state.projects.map(p => [p.id, p]));
  return state.entries
    .map(e => {
      const p = projectMap.get(e.projectId);
      return { 
        ...e, 
        project: p ? p.name : '—',
        rate: p && p.hourlyRate != null ? p.hourlyRate : state.settings.hourlyRate,
        clientName: p ? p.clientName : '',
        clientAddress: p ? p.clientAddress : ''
      };
    })
    .sort((a, b) => String(a.date).localeCompare(String(b.date)) || a.project.localeCompare(b.project));
}

async function saveSettings() {
  if (!canEdit()) { toast('Account in sola lettura', 'error'); return; }
  const rateEl = $('#s-rate'), extraEl = $('#s-extra'), taxEl = $('#s-tax'), themeEl = $('#s-theme');
  const rate = Number(rateEl.value);
  const extra = Number(extraEl.value);
  const tax = Number(taxEl.value);
  const theme = themeEl.value;

  if (isNaN(rate) || rate < 0) { toast('Tariffa oraria non valida', 'error'); return; }
  if (isNaN(extra) || extra < 0) { toast('Extra non valido', 'error'); return; }
  if (isNaN(tax) || tax < 0 || tax > 100) { toast('Aliquota tasse non valida', 'error'); return; }

  // I campi di pagamento esistono solo per il proprietario: altrimenti si conservano i valori attuali
  const holderEl = $('#s-holder'), ibanEl = $('#s-iban'), bicEl = $('#s-bic');

  state.settings = {
    id: 'app',
    hourlyRate: rate,
    extra: extra,
    taxRate: tax,
    holderName: holderEl ? holderEl.value.trim() : (state.settings.holderName || ''),
    iban: ibanEl ? ibanEl.value.trim() : (state.settings.iban || ''),
    bic: bicEl ? bicEl.value.trim() : (state.settings.bic || ''),
    theme: theme
  };
  
  await dbPut('settings', state.settings);
  syncTheme(theme);
  cloudPush();
  toast('Impostazioni salvate');
}

/* ---------------------------------------------------------------------
   EXPORTS UTILS
--------------------------------------------------------------------- */
function download(filename, content, mime) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function csvCell(v) {
  const s = String(v == null ? '' : v);
  if (/[";\n\r]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
  return s;
}

function exportCSV() {
  const sep = ';';
  const flat = allEntriesFlat();
  const lines = [];
  lines.push(['Progetto', 'Spec.', 'Data', 'Ore', 'Tariffa applicata'].map(csvCell).join(sep));
  for (const e of flat) {
    lines.push([e.project, e.spec, dateIt(e.date), String(e.hours).replace('.', ','), String(e.rate).replace('.', ',')].map(csvCell).join(sep));
  }
  lines.push('');
  lines.push([csvCell('Ore totali'), '', '', csvCell(String(totalHours()).replace('.', ','))].join(sep));
  lines.push([csvCell('Compenso stimato (€)'), '', '', csvCell(String(totalCompensation()).replace('.', ','))].join(sep));
  
  download(`ore-brickboy_${todayIso()}.csv`, '\uFEFF' + lines.join('\r\n'), 'text/csv;charset=utf-8');
  toast('CSV esportato con successo');
}

function exportJSON() {
  const dump = {
    app: 'ore-brickboy',
    version: 1,
    exportedAt: new Date().toISOString(),
    settings: state.settings,
    projects: state.projects,
    entries: state.entries
  };
  download(`ore-brickboy_backup_${todayIso()}.json`, JSON.stringify(dump, null, 2), 'application/json');
  toast('Backup JSON esportato');
}

function validateBackup(obj) {
  if (!obj || typeof obj !== 'object') return { ok: false, error: 'File non valido: contenuto non riconosciuto.' };
  if (!Array.isArray(obj.projects) || !Array.isArray(obj.entries)) {
    return { ok: false, error: 'File non valido: mancano "projects" o "entries".' };
  }
  if (!obj.settings || typeof obj.settings !== 'object') {
    return { ok: false, error: 'File non valido: manca la sezione "settings".' };
  }
  return { ok: true, data: obj };
}

function importJSON(ev) {
  if (!canEdit()) { toast('Account in sola lettura', 'error'); return; }
  const file = ev.target.files && ev.target.files[0];
  ev.target.value = '';
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    let parsed;
    try { parsed = JSON.parse(reader.result); }
    catch (_) { toast('File JSON non leggibile', 'error'); return; }
    const res = validateBackup(parsed);
    if (!res.ok) { toast(res.error, 'error'); return; }
    const d = res.data;
    openModal({
      title: 'Importare il backup?',
      danger: true,
      bodyHTML: `<p class="text-[14px]">Questo file contiene <span class="font-bold text-accent">${d.projects.length}</span> progetti e <span class="font-bold text-accent">${d.entries.length}</span> voci. L'importazione <span class="font-bold text-red-500">sovrascriverà tutti i dati attuali</span>.</p>`,
      confirmText: 'Sovrascrivi',
      onConfirm: async () => {
        try {
          await dbClear('projects');
          await dbClear('entries');
          await dbPut('settings', d.settings);
          for (const p of d.projects) await dbPut('projects', p);
          for (const e of d.entries) await dbPut('entries', e);
          await loadState();
          state.expanded.clear();
          render();
          cloudPush();
          toast('Database ripristinato!');
        } catch (err) {
          toast('Errore durante il ripristino del database', 'error');
        }
      }
    });
  };
  reader.readAsText(file);
}

/* ---------------------------------------------------------------------
   CLOUD SYNC — Firebase Auth & Firestore Setup (Refined Pattern)
--------------------------------------------------------------------- */
const sync = {
  enabled: false,
  ready: false,
  auth: null,
  db: null,
  user: null,
  role: null,        // 'owner' | 'client' | null (ruolo dell'account autenticato)
  pendingRole: null, // ruolo scelto al momento della registrazione
  unsub: null,
  applyingRemote: false,
  pushTimer: null,
  status: 'off'
};

/* ---------------------------------------------------------------------
   PERMISSIONS & ROLE HELPERS
   Logica di accesso centralizzata:
   - Se Firebase NON è attivo (offline / file://) l'app gira in modalità
     "proprietario locale": accesso completo e IBAN visibile sul proprio
     dispositivo (non esiste un sistema di account da proteggere).
   - Se Firebase È attivo, l'IBAN è riservato a chi ha effettuato l'accesso
     e gli account "Cliente" hanno accesso in sola lettura.
--------------------------------------------------------------------- */
function isAuthed() {
  return !!(sync.enabled && sync.user);
}
function currentRole() {
  if (!sync.enabled) return 'owner';      // modalità locale = proprietario
  if (!sync.user) return 'guest';         // Firebase attivo ma non loggato
  return sync.role === 'client' ? 'client' : 'owner'; // default retro-compatibile: owner
}
function isClient()  { return currentRole() === 'client'; }
function isGuest()   { return currentRole() === 'guest'; }
/* I Clienti sono in sola lettura. Proprietari, ospiti locali e modalità
   offline possono modificare i dati (l'ospite modifica solo la copia locale). */
function canEdit()   { return !isClient(); }
/* L'IBAN è visibile in modalità locale oppure dopo l'accesso. */
function canSeeIban() { return !sync.enabled || isAuthed(); }
/* Solo il Proprietario (o la modalità locale) può modificare i dati di pagamento. */
function canManagePayment() { return canSeeIban() && !isClient(); }
function roleLabel(r) {
  return r === 'client' ? 'Cliente' : (r === 'guest' ? 'Ospite' : 'Proprietario');
}

function firebaseConfigured() {
  const c = window.FIREBASE_CONFIG || {};
  return typeof firebase !== 'undefined' && !!c.apiKey && !!c.projectId;
}

function userDocRef() {
  if (!sync.user) return null;
  // Percorso allineato alle regole Firestore: /users/{uid}
  return sync.db.collection('users').doc(sync.user.uid);
}

function setSyncStatus(status) {
  sync.status = status;
  updateSyncBadge();
  if (state.view === 'settings') renderSettings();
}

function updateSyncBadge() {
  const el = $('#sync-badge');
  if (!el) return;
  if (!sync.enabled) { el.classList.add('hidden'); return; }
  el.classList.remove('hidden');
  const map = {
    signedout: { t: 'Non connesso', c: 'bg-black/5 dark:bg-white/5 text-ink-soft', dot: '○' },
    syncing:   { t: 'Sincronizzo…', c: 'bg-accent-soft text-accent', dot: '⟳' },
    synced:    { t: 'Sincronizzato', c: 'bg-emerald-500/10 text-emerald-600 dark:text-emerald-400', dot: '●' },
    error:     { t: 'Errore sync', c: 'bg-[#ff3b30]/10 text-[#ff3b30]', dot: '⚠' },
    off:       { t: '', c: '', dot: '' }
  };
  const m = map[sync.status] || map.signedout;
  el.className = `shrink-0 text-[12px] font-medium rounded-full px-2.5 py-1 transition-soft flex items-center gap-1.5 ${m.c}`;
  el.innerHTML = `<span>${m.dot}</span><span>${esc(m.t)}</span>`;
  el.onclick = () => setView('settings');
}

function initSync() {
  if (!firebaseConfigured()) { sync.enabled = false; updateSyncBadge(); return; }
  try {
    firebase.initializeApp(window.FIREBASE_CONFIG);
    sync.auth = firebase.auth();
    sync.db = firebase.firestore();
    sync.enabled = true;
    sync.ready = true;
    try { sync.db.enablePersistence({ synchronizeTabs: true }).catch(() => {}); } catch (_) {}
    sync.auth.onAuthStateChanged(onAuthChanged);
    setSyncStatus('signedout');
  } catch (err) {
    sync.enabled = false;
    console.error('Firebase initialization failed', err);
    updateSyncBadge();
  }
}

function onAuthChanged(user) {
  sync.user = user || null;
  if (user) {
    // Mantiene il ruolo scelto in fase di registrazione finché lo snapshot non lo conferma
    if (sync.pendingRole) { sync.role = sync.pendingRole; }
    startCloudListener();
  } else {
    sync.role = null;
    sync.pendingRole = null;
    stopCloudListener();
    setSyncStatus('signedout');
  }
  // Re-render dell'intera vista corrente: i permessi (IBAN, sola lettura) cambiano
  render();
}

function startCloudListener() {
  const ref = userDocRef();
  if (!ref) return;
  setSyncStatus('syncing');
  stopCloudListener();
  sync.unsub = ref.onSnapshot(
    async (snap) => {
      if (snap.metadata && snap.metadata.hasPendingWrites) return;
      if (!snap.exists) {
        await pushNow();
        setSyncStatus('synced');
        return;
      }
      await applyRemote(snap.data());
      setSyncStatus('synced');
    },
    (err) => {
      console.error('Snapshot error', err);
      setSyncStatus('error');
      toast(syncErrorMsg(err), 'error');
    }
  );
}

function stopCloudListener() {
  if (sync.unsub) { sync.unsub(); sync.unsub = null; }
}

async function applyRemote(data) {
  if (!data) return;
  sync.applyingRemote = true;
  try {
    // Sincronizza il ruolo dell'account dal documento remoto (retro-compatibile)
    if (data.accountRole === 'client' || data.accountRole === 'owner') {
      sync.role = data.accountRole;
    } else if (!sync.role) {
      sync.role = 'owner';
    }
    const settings = data.settings && typeof data.settings === 'object' ? data.settings : { ...DEFAULT_SETTINGS };
    settings.id = 'app';
    const projects = Array.isArray(data.projects) ? data.projects : [];
    const entries = Array.isArray(data.entries) ? data.entries : [];
    await dbClear('projects');
    await dbClear('entries');
    await dbPut('settings', settings);
    for (const p of projects) await dbPut('projects', p);
    for (const e of entries) await dbPut('entries', e);
    await loadState();
    render();
  } catch (err) {
    console.error('applyRemote failed', err);
  } finally {
    sync.applyingRemote = false;
  }
}

async function pushNow() {
  const ref = userDocRef();
  if (!ref) return;
  setSyncStatus('syncing');
  try {
    await ref.set({
      accountRole: sync.role || 'owner',
      settings: state.settings,
      projects: state.projects,
      entries: state.entries,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    setSyncStatus('synced');
  } catch (err) {
    console.error('push failed', err);
    setSyncStatus('error');
    toast(syncErrorMsg(err), 'error');
  }
}

function cloudPush() {
  if (!sync.enabled || !sync.user || sync.applyingRemote) return;
  setSyncStatus('syncing');
  clearTimeout(sync.pushTimer);
  sync.pushTimer = setTimeout(pushNow, 400);
}

/* Messaggio leggibile per gli errori di sincronizzazione Firestore */
function syncErrorMsg(err) {
  const code = (err && err.code) ? String(err.code) : '';
  if (code.indexOf('permission-denied') !== -1) {
    return 'Sincronizzazione negata: aggiorna le regole di sicurezza di Firestore.';
  }
  if (code.indexOf('unavailable') !== -1) return 'Firestore non raggiungibile. Controlla la connessione.';
  if (code.indexOf('failed-precondition') !== -1) return 'Database Firestore non configurato (va creato dalla console).';
  if (code.indexOf('not-found') !== -1) return 'Database Firestore non trovato: crealo dalla console.';
  return 'Errore di sincronizzazione' + (code ? ' (' + code + ')' : '') + '.';
}

/* Auth helpers */
function authError(code) {
  const map = {
    'auth/invalid-email': 'Email non valida.',
    'auth/missing-password': 'Inserisci la password.',
    'auth/weak-password': 'La password deve avere almeno 6 caratteri.',
    'auth/email-already-in-use': 'Esiste già un account con questa email.',
    'auth/invalid-credential': 'Email o password non corretti.',
    'auth/wrong-password': 'Email o password non corretti.',
    'auth/user-not-found': 'Nessun account con questa email.',
    'auth/too-many-requests': 'Troppi tentativi. Riprova più tardi.',
    'auth/network-request-failed': 'Errore di rete. Controlla la connessione.',
    'auth/operation-not-allowed': 'Metodo Email/Password non abilitato: attivalo in Firebase → Authentication → Sign-in method.',
    'auth/configuration-not-found': 'Metodo Email/Password non abilitato in Firebase → Authentication → Sign-in method.',
    'auth/unauthorized-domain': 'Dominio non autorizzato: aggiungilo in Firebase → Authentication → Settings → Authorized domains.',
    'auth/api-key-not-valid': 'Chiave API Firebase non valida o con restrizioni troppo rigide (Google Cloud Console).',
    'auth/api-key-not-valid.-please-pass-a-valid-api-key.': 'Chiave API Firebase non valida o con restrizioni troppo rigide (Google Cloud Console).',
    'auth/invalid-api-key': 'Chiave API Firebase non valida o con restrizioni troppo rigide (Google Cloud Console).',
    'auth/requests-from-referer-are-blocked': 'Richieste bloccate dalle restrizioni della chiave API. Autorizza questo dominio o l\u2019Identity Toolkit API in Google Cloud Console.',
    'auth/admin-restricted-operation': 'Operazione bloccata dalle impostazioni del progetto Firebase.'
  };
  // Mostra il codice reale quando non è mappato, così la diagnosi è possibile
  return map[code] || ('Operazione non riuscita' + (code ? ' (' + code + ')' : '') + '.');
}

async function doSignIn(email, password) {
  try {
    sync.pendingRole = null; // al login il ruolo arriva dal documento remoto
    await sync.auth.signInWithEmailAndPassword(email, password);
    toast('Accesso effettuato');
  }
  catch (err) { console.error('Sign-in error', err); showAuthError(authError(err.code)); toast(authError(err.code), 'error'); }
}
async function doSignUp(email, password, role) {
  try {
    // Imposta il ruolo PRIMA della creazione, così il primo salvataggio cloud lo registra
    sync.pendingRole = (role === 'client') ? 'client' : 'owner';
    sync.role = sync.pendingRole;
    await sync.auth.createUserWithEmailAndPassword(email, password);
    // La verifica email è facoltativa e non blocca l'app: si invia su richiesta dal pannello account.
    toast('Account ' + roleLabel(sync.pendingRole) + ' creato');
  }
  catch (err) { console.error('Sign-up error', err); sync.pendingRole = null; showAuthError(authError(err.code)); toast(authError(err.code), 'error'); }
}
async function doSignOut() {
  try { await sync.auth.signOut(); toast('Disconnesso'); }
  catch (err) { toast('Errore durante la disconnessione', 'error'); }
}
async function doSendVerification() {
  if (!sync.user) return;
  try {
    await sync.user.sendEmailVerification();
    toast('Email di verifica inviata');
  } catch (err) {
    toast(authError(err.code), 'error');
  }
}

/* Mostra l'errore in modo persistente nel pannello account (se presente) */
function showAuthError(message) {
  const box = $('#a-error');
  if (box) { box.textContent = message; box.classList.remove('hidden'); }
}

           <button id="a-verify" class="px-3 py-1.5 rounded-full border border-black/10 dark:border-white/10 hover:bg-black/[.03] dark:hover:bg-white/[.03] text-[12px] font-medium transition-soft">Invia verifica</button>

        <div class="flex items-center justify-between gap-3">
          <div class="min-w-0">
            <div class="flex items-center gap-2">
              <span class="text-[14px] font-semibold truncate text-ink dark:text-white">${esc(sync.user.email || 'Account')}</span>
              ${roleBadge}
            </div>
            <div class="text-[12px] text-ink-soft dark:text-zinc-400 mt-0.5">${esc(statusText)}</div>
          </div>
          <button id="a-signout" class="shrink-0 px-4 py-2 rounded-full border border-black/10 dark:border-white/10 hover:bg-black/[.03] dark:hover:bg-white/[.03] text-[13px] font-medium transition-soft">Esci</button>

function bindAccountPanel() {
  if (!sync.enabled) return;
  if (sync.user) {
    const out = $('#a-signout');
    if (out) out.addEventListener('click', doSignOut);
    const ver = $('#a-verify');
    if (ver) ver.addEventListener('click', doSendVerification);
    return;
  }
  const emailEl = $('#a-email');
  const passEl = $('#a-pass');
  const errEl = $('#a-error');
  const roleSeg = $('#a-role');
  const roleHint = $('#a-role-hint');
  let chosenRole = 'owner';

  if (roleSeg) {
    $$('button[data-role]', roleSeg).forEach(btn => {
      btn.addEventListener('click', () => {
        chosenRole = btn.dataset.role;
        $$('button[data-role]', roleSeg).forEach(b => b.setAttribute('aria-selected', String(b === btn)));
        if (roleHint) {
          roleHint.textContent = chosenRole === 'client'
            ? 'Cliente: accesso in sola lettura per consultare la Nota di pagamento e l\u2019IBAN.'
            : 'Proprietario: controllo completo di progetti, ore, tariffe e IBAN.';
        }
      });
    });
  }

  const readCreds = () => ({ email: (emailEl.value || '').trim(), password: passEl.value || '' });
  const showErr = (m) => { if (errEl) { errEl.textContent = m; errEl.classList.remove('hidden'); } };
  const validEmail = (e) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);
  const guard = (c, isSignup) => {
    if (!c.email) { showErr('Inserisci la tua email.'); return false; }
    if (!validEmail(c.email)) { showErr('Formato email non valido.'); return false; }
    if (!c.password) { showErr('Inserisci la password.'); return false; }
    if (isSignup && c.password.length < 6) { showErr('La password deve avere almeno 6 caratteri.'); return false; }
    if (errEl) errEl.classList.add('hidden');
    return true;
  };
  const signin = $('#a-signin');
  const signup = $('#a-signup');
  if (signin) signin.addEventListener('click', () => { const c = readCreds(); if (guard(c, false)) doSignIn(c.email, c.password); });
  if (signup) signup.addEventListener('click', () => { const c = readCreds(); if (guard(c, true)) doSignUp(c.email, c.password, chosenRole); });
  if (passEl) passEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') { const c = readCreds(); if (guard(c, false)) doSignIn(c.email, c.password); } });
}

/* ---------------------------------------------------------------------
   BOOTSTRAP APPLICATION WITH AUTO-RECOVERY GUARANTEE
--------------------------------------------------------------------- */
async function boot() {
  try {
    try {
      _db = await openDB();
    } catch (dbErr) {
      console.warn("IndexedDB non utilizzabile direttamente. Attivazione fallback strutturato...", dbErr);
      initFallbackStorage();
    }
    
    await seedIfEmpty();
    await loadState();
    
    // Set view routing handlers
    $$('#nav button').forEach(b => b.addEventListener('click', () => setView(b.dataset.view)));
    
    // Bind Theme button manual controls
    const themeBtn = $('#theme-toggle');
    if (themeBtn) {
      themeBtn.addEventListener('click', () => {
        const isCurrentlyDark = document.body.classList.contains('dark');
        const nextTheme = isCurrentlyDark ? 'light' : 'dark';
        state.settings.theme = nextTheme;
        dbPut('settings', state.settings);
        syncTheme(nextTheme);
      });
    }

    // Sync system interface theme
    syncTheme(state.settings.theme || 'auto');

    setView('dashboard');
    initSync();
    
    if (_useFallback) {
      setTimeout(() => {
        toast('Esecuzione locale protetta. Dati salvati con successo.', 'warning');
      }, 800);
    }
  } catch (err) {
    console.error("Crash riscontrato in fase di boot: ", err);
    console.warn("Esecuzione della procedura d'emergenza in memoria volatile protetta...");
    
    // Avvio di Emergenza Isolato (In-Memory a tolleranza totale)
    _useFallback = true;
    initFallbackStorage();
    
    state.settings = { ...DEFAULT_SETTINGS };
    state.projects = [
      { id: 'p1', name: 'Arcade BrickBoy', createdAt: '2026-06-17', hourlyRate: 30, clientName: 'Retrogames SRL', clientAddress: 'Via Roma 12, Milano' },
      { id: 'p2', name: 'GameBoy BrickBoy', createdAt: '2026-05-22', hourlyRate: null, clientName: 'Console Club', clientAddress: 'Corso Sempione 8, Roma' },
      { id: 'p3', name: 'Play station 1 BrickBoy', createdAt: '2026-03-30', hourlyRate: 35, clientName: 'Sony Fans', clientAddress: 'Piazza Duomo 3, Torino' }
    ];
    state.entries = [
      { id: 'e1', projectId: 'p1', spec: 'Seconda Iterazione Arcade', date: '2026-06-17', hours: 1 },
      { id: 'e2', projectId: 'p2', spec: 'Seconda Iterazione istruzioni', date: '2026-05-22', hours: 5 },
      { id: 'e3', projectId: 'p2', spec: 'Terza Iterazione istruzioni', date: '2026-06-11', hours: 2 },
      { id: 'e4', projectId: 'p3', spec: 'Realizzazione file studio Play Station 1', date: '2026-03-30', hours: 0 }
    ];
    state.activeTimer = null;
    
    // Configura e disegna l'applicazione in modalità protetta
    $$('#nav button').forEach(b => b.addEventListener('click', () => setView(b.dataset.view)));
    const themeBtn = $('#theme-toggle');
    if (themeBtn) {
      themeBtn.addEventListener('click', () => {
        const isCurrentlyDark = document.body.classList.contains('dark');
        const nextTheme = isCurrentlyDark ? 'light' : 'dark';
        state.settings.theme = nextTheme;
        syncTheme(nextTheme);
      });
    }
    syncTheme('auto');
    setView('dashboard');
    
    setTimeout(() => {
      toast('Avvio d\'emergenza completato. App funzionante.', 'warning');
    }, 800);
  }
}
